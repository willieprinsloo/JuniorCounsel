version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: junior-counsel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-junior_counsel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - junior-counsel-network

  # Redis for queue
  redis:
    image: redis:7-alpine
    container_name: junior-counsel-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - junior-counsel-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: junior-counsel-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-junior_counsel}
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - junior-counsel-network
    restart: unless-stopped

  # Worker (document processing)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: junior-counsel-worker
    depends_on:
      - backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-junior_counsel}
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: python -m rq worker --url redis://redis:6379/0 default document_processing draft_generation
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - junior-counsel-network
    restart: unless-stopped

  # Nginx reverse proxy (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: junior-counsel-nginx
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - junior-counsel-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  junior-counsel-network:
    driver: bridge
